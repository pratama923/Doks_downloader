<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DOKS DOWNLOADER</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>

:root{
    --bg:#0f0f0f;
    --card:#1e1e1e;
    --text:#ffffff;
    --muted:#9ca3af;
    --accent:linear-gradient(45deg,#8b5cf6,#f97316,#3b82f6);
    --purple:#8b5cf6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#080808;
    color:var(--text);
    display:flex;
    justify-content:center;
    min-height:100vh;
}

.app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    overflow:hidden;
}

.header{
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-bottom:1px solid rgba(255,255,255,.05);
}

.logo{
    font-size:18px;
    font-weight:800;
    background:var(--accent);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.content{
    padding:20px;
}

.brand{
    background:var(--card);
    border-radius:25px;
    padding:20px;
    margin-bottom:20px;
}

.profile{
    display:flex;
    align-items:center;
    gap:15px;
}

.profile img{
    width:60px;
    height:60px;
    border-radius:50%;
    border:2px solid var(--purple);
    object-fit:cover;
}

.profile h2{
    font-size:17px;
    margin-bottom:4px;
}

.profile p{
    font-size:12px;
    color:var(--muted);
}

.marquee{
    margin-top:15px;
    overflow:hidden;
    white-space:nowrap;
    background:#151515;
    border-radius:10px;
    padding:10px 0;
}

.marquee span{
    display:inline-block;
    padding-left:100%;
    animation:marquee 15s linear infinite;
    font-size:11px;
    color:var(--muted);
}

@keyframes marquee{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

.sosmed{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:20px;
}

.sos-btn{
    background:var(--card);
    border-radius:18px;
    padding:14px 5px;
    text-align:center;
    cursor:pointer;
    transition:.2s;
}

.sos-btn.active{
    background:var(--accent);
}

.sos-btn i{
    font-size:25px;
}

.sos-btn span{
    display:block;
    margin-top:5px;
    font-size:10px;
    font-weight:700;
}

.tabs{
    display:flex;
    gap:10px;
    background:var(--card);
    padding:5px;
    border-radius:16px;
    margin-bottom:20px;
}

.tab{
    flex:1;
    padding:12px;
    border-radius:12px;
    text-align:center;
    font-size:12px;
    font-weight:700;
    color:var(--muted);
    cursor:pointer;
}

.tab.active{
    background:#111;
    color:white;
}

.card{
    background:var(--card);
    border-radius:25px;
    padding:20px;
}

.title{
    font-size:13px;
    font-weight:800;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:11px;
    font-weight:700;
    color:var(--muted);
}

.input-group input,
.input-group select{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    background:#151515;
    border-radius:14px;
    color:white;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:var(--accent);
    color:white;
    font-weight:800;
    cursor:pointer;
    font-size:14px;
}

.result{
    display:none;
    margin-top:20px;
    background:#151515;
    border-radius:20px;
    padding:15px;
}

.result img{
    width:100%;
    border-radius:15px;
    margin-bottom:15px;
}

.result h3{
    font-size:14px;
    margin-bottom:15px;
}

.result a{
    display:block;
    text-decoration:none;
    text-align:center;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:var(--muted);
    font-size:11px;
}

.toast{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:12px 20px;
    border-radius:12px;
    color:white;
    font-size:12px;
    font-weight:700;
    z-index:9999;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="logo">
DOKS DOWNLOADER
</div>
</div>

<div class="content">

<div class="brand">

<div class="profile">

<img src="https://files.catbox.moe/gsy8am.jpg">

<div>
<h2 id="brandTitle">YOUTUBE DOWNLOADER</h2>
<p>Doks Multi Downloader</p>
</div>

</div>

<div class="marquee">
<span>
🚀 Fast Download • YouTube • TikTok • MP4 • MP3 • No Ads
</span>
</div>

</div>

<div class="sosmed">

<div class="sos-btn active"
data-sosmed="youtube">

<i class="ri-youtube-fill"
style="color:red;"></i>

<span>YouTube</span>

</div>

<div class="sos-btn"
data-sosmed="tiktok">

<i class="ri-tiktok-fill"></i>

<span>TikTok</span>

</div>

<div class="sos-btn"
data-sosmed="instagram">

<i class="ri-instagram-line"
style="color:#e4405f;"></i>

<span>Instagram</span>

</div>

<div class="sos-btn"
data-sosmed="facebook">

<i class="ri-facebook-circle-fill"
style="color:#1877f2;"></i>

<span>Facebook</span>

</div>

</div>

<div class="tabs">

<div class="tab active"
data-tab="mp4">

VIDEO MP4

</div>

<div class="tab"
data-tab="mp3">

AUDIO MP3

</div>

</div>

<div id="mp4Page">

<div class="card">

<div class="title">
DOWNLOAD VIDEO
</div>

<div class="input-group">

<label>Link Video</label>

<input type="text"
id="mp4Url"
placeholder="Tempel link video...">

</div>

<div class="input-group">

<label>Resolusi</label>

<select id="mp4Quality">
<option value="1080">1080p</option>
<option value="720" selected>720p</option>
<option value="480">480p</option>
<option value="360">360p</option>
</select>

</div>

<button class="btn"
id="mp4Btn">

DOWNLOAD VIDEO

</button>

<div class="result"
id="mp4Result"></div>

</div>

</div>

<div id="mp3Page"
style="display:none;">

<div class="card">

<div class="title">
DOWNLOAD AUDIO
</div>

<div class="input-group">

<label>Link Video</label>

<input type="text"
id="mp3Url"
placeholder="Tempel link...">

</div>

<div class="input-group">

<label>Kualitas</label>

<select id="mp3Quality">
<option value="320">320kbps</option>
<option value="192" selected>192kbps</option>
<option value="128">128kbps</option>
</select>

</div>

<button class="btn"
id="mp3Btn">

DOWNLOAD MP3

</button>

<div class="result"
id="mp3Result"></div>

</div>

</div>

<div class="footer">
Created with ❤️ by Doks © 2026
</div>

</div>

</div>

<script>

let currentSosmed = 'youtube';

function toast(msg,error=false){

    const t = document.createElement('div');

    t.className = 'toast';

    t.style.background =
    error ? '#ef4444' : '#10b981';

    t.innerText = msg;

    document.body.appendChild(t);

    setTimeout(()=>{
        t.remove();
    },2500);
}

document.querySelectorAll('.sos-btn')
.forEach(btn=>{

    btn.onclick = ()=>{

        document.querySelectorAll('.sos-btn')
        .forEach(b=>b.classList.remove('active'));

        btn.classList.add('active');

        currentSosmed =
        btn.dataset.sosmed;

        document.getElementById('brandTitle')
        .innerText =
        currentSosmed.toUpperCase()
        + ' DOWNLOADER';
    };
});

document.querySelectorAll('.tab')
.forEach(tab=>{

    tab.onclick = ()=>{

        document.querySelectorAll('.tab')
        .forEach(t=>t.classList.remove('active'));

        tab.classList.add('active');

        const target =
        tab.dataset.tab;

        document.getElementById('mp4Page')
        .style.display =
        target === 'mp4'
        ? 'block'
        : 'none';

        document.getElementById('mp3Page')
        .style.display =
        target === 'mp3'
        ? 'block'
        : 'none';
    };
});

async function performDownload(type){

    const input =
    type === 'mp4'
    ? document.getElementById('mp4Url')
    : document.getElementById('mp3Url');

    const resultDiv =
    type === 'mp4'
    ? document.getElementById('mp4Result')
    : document.getElementById('mp3Result');

    const url =
    input.value.trim();

    if(!url){

        toast("Masukkan URL!",true);

        return;
    }

    resultDiv.style.display = 'block';

    resultDiv.innerHTML = `
    <div style="text-align:center;padding:20px;">

    <i class="ri-loader-4-line ri-spin"
    style="font-size:30px;color:#8b5cf6;"></i>

    <p style="margin-top:10px;">
    Memproses...
    </p>

    </div>
    `;

    try{

        let apiUrl = '';

        // YOUTUBE
        if(currentSosmed === 'youtube'){

            apiUrl =
            `https://api.agatz.xyz/api/${type === 'mp3' ? 'ytmp3' : 'ytmp4'}?url=${encodeURIComponent(url)}`;
        }

        // TIKTOK
        else if(currentSosmed === 'tiktok'){

            apiUrl =
            `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;
        }

        // INSTAGRAM
        else if(currentSosmed === 'instagram'){

            apiUrl =
            `https://api.agatz.xyz/api/igdl?url=${encodeURIComponent(url)}`;
        }

        // FACEBOOK
        else if(currentSosmed === 'facebook'){

            apiUrl =
            `https://api.agatz.xyz/api/fbdl?url=${encodeURIComponent(url)}`;
        }

        const response =
        await fetch(apiUrl);

        const data =
        await response.json();

        console.log(data);

        const result =
        data.data ||
        data.result ||
        data;

        let downloadUrl = '';

        // TIKTOK
        if(currentSosmed === 'tiktok'){

            downloadUrl =
            result.play ||
            result.wmplay ||
            result.music;

        }else{

            downloadUrl =
            result.download ||
            result.url ||
            result.video ||
            result.audio ||
            result.mp4 ||
            result.mp3;
        }

        if(!downloadUrl){

            throw new Error();
        }

        const thumb =
        result.cover ||
        result.thumbnail ||
        result.thumb ||
        'https://files.catbox.moe/gsy8am.jpg';

        const title =
        result.title ||
        result.fullTitle ||
        'Downloader Result';

        resultDiv.innerHTML = `

        <img src="${thumb}">

        <h3>${title}</h3>

        <a href="${downloadUrl}"
        target="_blank"
        class="btn">

        DOWNLOAD SEKARANG

        </a>
        `;

        toast("Berhasil!");

    }catch(err){

        console.log(err);

        resultDiv.innerHTML = `
        <div style="text-align:center;padding:20px;">

        <i class="ri-error-warning-fill"
        style="font-size:35px;color:red;"></i>

        <p style="margin-top:10px;">
        Gagal mengambil data.
        </p>

        </div>
        `;

        toast("Terjadi kesalahan!",true);
    }
}

document.getElementById('mp4Btn')
.onclick = ()=>{

    performDownload('mp4');
};

document.getElementById('mp3Btn')
.onclick = ()=>{

    performDownload('mp3');
};

</script>

</body>
</html>
